name: API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint imports (optional)
        run: |
          python -c "import app.main; print('imports OK')"

      - name: Run pytest
        run: pytest --tb=short

      - name: Verify Alembic autogenerate has no pending changes
        run: |
          rm -f jaratrade.db
          alembic upgrade head
          alembic revision --autogenerate -m "ci-check" --rev-id ci-check
          if grep -q "op\." alembic/versions/ci-check_*.py; then
            echo "::warning::Schema drift detected — run alembic revision --autogenerate locally"
          fi
          rm -f alembic/versions/ci-check_*.py

  build-image:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (smoke)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: jaratrade-api:ci
